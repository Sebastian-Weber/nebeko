const fmt = (n) =>

const toBase64 = (file) =>
  new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

const berechneAbrechnung = (einheiten, kostenpositionen) => {
  const gesamtflaeche    = einheiten.reduce((s, e) => s + e.flaeche, 0);
  const flaechenkosten   = kostenpositionen.filter(k => k.umlageschluessel === "flaeche")
                            .reduce((s, k) => s + (k.gesamtbetrag || 0), 0);
  const verbrauchskosten = kostenpositionen.filter(k => k.umlageschluessel === "verbrauch")
                            .reduce((s, k) => s + (k.gesamtbetrag || 0), 0);

  return einheiten.map((e) => {
    const anteil        = e.flaeche / gesamtflaeche;
    const gesamtanteil  = (flaechenkosten + verbrauchskosten) * anteil;
    const saldo         = e.vorauszahlung - gesamtanteil;
    return { ...e, gesamtanteil, saldo, anteil };
  });
};

// ═══════════════════════════════════════════════════════
// CLAUDE API EXTRACTION
// ═══════════════════════════════════════════════════════
const extractWithClaude = async (base64, file) => {
  const isImage    = file.type.startsWith("image/");
  const mediaType  = file.type === "application/pdf" ? "application/pdf" : file.type;

  const docBlock = isImage
    ? { type: "image",    source: { type: "base64", media_type: mediaType, data: base64 } }
    : { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } };

  const res  = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model:      "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: [
          docBlock,
          {
            type: "text",
            text: `Du analysierst eine deutsche Versorgerrechnung für eine Nebenkostenabrechnung.
Antworte NUR mit reinem JSON – kein Markdown, keine Erklärungen:

{
  "versorger": "Name des Versorgers",
  "zeitraum": "z.B. 01.01.2025–31.12.2025",
  "positionen": [
    { "bezeichnung": "Kostenposition", "betrag": 0.00 }
  ],
  "gesamtbetrag": 0.00,
  "umlageschluessel": "flaeche"
}

Regeln:
- umlageschluessel: "flaeche" für objektbezogene Kosten (Hausversicherung, Treppenhausreinigung etc.),
  "verbrauch" für individuelle Verbrauchskosten (Wasser, Heizung, Gas)
- Falls das Dokument keine Rechnung ist: { "fehler": "Kein Rechnungsdokument erkannt" }`
          }
        ]
      }]
    })
  });

  const data = await res.json();
  const raw  = data.content?.find(b => b.type === "text")?.text || "{}";
  try {
    return JSON.parse(raw.replace(/```json[\s\S]*?```|```/g, "").trim());
  } catch {
    return { fehler: "JSON-Parsing fehlgeschlagen" };
  }
};

function ReviewScreen({ files, reviewIdx, setReviewIdx, onUpdateConfirmed, onExtractFile, onNext }) {
  const current     = files[reviewIdx];
  const allDone     = files.every(f => f.status === "done" || f.status === "error");
  const hasConfirmed = files.some(f => f.confirmed);

  // Auto-extract when current file is still pending
  useEffect(() => {
    if (current && current.status === "pending") {
      onExtractFile(current);
    }
  }, [current?.id]);

  const updateMeta = (field, value) => {
    if (!current?.confirmed) return;
    onUpdateConfirmed(current.id, { ...current.confirmed, [field]: value });
  };

  const updatePos = (i, field, value) => {
    if (!current?.confirmed) return;
    const pos = [...current.confirmed.positionen];
    pos[i]    = { ...pos[i], [field]: field === "betrag" ? parseFloat(value) || 0 : value };
    const total = pos.reduce((s, p) => s + (p.betrag || 0), 0);
    onUpdateConfirmed(current.id, { ...current.confirmed, positionen: pos, gesamtbetrag: total });
  };

  const addPos = () => {
    if (!current?.confirmed) return;
    const pos = [...current.confirmed.positionen, { bezeichnung: "", betrag: 0 }];
    onUpdateConfirmed(current.id, { ...current.confirmed, positionen: pos });
  };

  const removePos = (i) => {
    if (!current?.confirmed) return;
    const pos   = current.confirmed.positionen.filter((_, j) => j !== i);
    const total = pos.reduce((s, p) => s + (p.betrag || 0), 0);
    onUpdateConfirmed(current.id, { ...current.confirmed, positionen: pos, gesamtbetrag: total });
  };

  const goToFile = (i) => {
    setReviewIdx(i);
    if (files[i] && files[i].status === "pending") onExtractFile(files[i]);
  };

  return (
    <div style={{ padding: "44px 52px", maxWidth: 940, minHeight: "100%" }}>
      {/* Header */}
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>
          Schritt 2 von 3
        </div>
        <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 400, marginBottom: 8 }}>
          KI-Extraktion prüfen & bestätigen
        </h1>
        <p style={{ color: C.textMuted, fontSize: 14, lineHeight: 1.6, maxWidth: 580 }}>
          Prüfen Sie die extrahierten Daten und korrigieren Sie bei Bedarf.
          Fehler in den Quelldaten können die Abrechnung rechtlich anfechtbar machen.
        </p>
      </div>

      {/* File tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 26, flexWrap: "wrap" }}>
        {files.map((f, i) => {
          const active = i === reviewIdx;
          const icon   = f.status === "extracting" ? "⟳"
                       : f.confirmed               ? "✓"
                       : f.status === "error"      ? "⚠"
                       :                             "○";
          return (
            <button
              key={f.id}
              onClick={() => goToFile(i)}
              style={{
                padding: "6px 14px", borderRadius: 7, fontSize: 13,
                border: `1.5px solid ${active ? C.forest : C.border}`,
                background: active ? C.forest : C.white,
                color: active ? C.white : C.text,
                cursor: "pointer", fontFamily: F.sans,
                display: "flex", alignItems: "center", gap: 6,
                fontWeight: active ? 500 : 400,
              }}
            >
              <span style={{ color: f.confirmed ? C.success : "inherit" }}>{icon}</span>
              {f.name.length > 22 ? f.name.slice(0, 20) + "…" : f.name}
            </button>
          );
        })}
      </div>

      {/* Content grid */}
      {current && (
        <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 20 }}>
          {/* Left panel */}
          <div>
            <div style={{ background: C.white, borderRadius: 12, border: `1.5px solid ${C.border}`, padding: 20, marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 14 }}>Quelldatei</div>
              <div style={{ fontSize: 28, marginBottom: 10 }}>
                {current.file.type === "application/pdf" ? "📄" : "🖼️"}
              </div>
              <div style={{ fontSize: 13, fontWeight: 500, wordBreak: "break-word", marginBottom: 4 }}>{current.name}</div>
              <div style={{ fontSize: 11, color: C.textMuted }}>{(current.file.size / 1024).toFixed(0)} KB</div>
            </div>

            {/* Status */}
            {current.status === "extracting" && (
              <div style={{ background: C.amberBg, borderRadius: 10, padding: "14px 16px", border: `1px solid ${C.amberBorder}` }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.amber, marginBottom: 4 }}>⟳ Dokument wird analysiert…</div>
                <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.5 }}>Die KI liest das Dokument und extrahiert alle Kostenpositionen. Bitte warten.</div>
              </div>
            )}
            {current.status === "error" && (
              <div style={{ background: C.dangerBg, borderRadius: 10, padding: "14px 16px", border: `1px solid ${C.dangerBorder}` }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.danger, marginBottom: 4 }}>⚠ Extraktion fehlgeschlagen</div>
                <div style={{ fontSize: 12, color: C.textMuted }}>Positionen können manuell eingegeben werden.</div>
              </div>
            )}
            {current.confirmed && (
              <div style={{ background: C.successBg, borderRadius: 10, padding: "14px 16px", border: `1px solid ${C.successBorder}` }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: C.success, marginBottom: 4 }}>✓ Bereit zur Übernahme</div>
                <div style={{ fontSize: 12, color: C.textMuted }}>Daten wurden extrahiert. Bitte prüfen Sie alle Werte.</div>
              </div>
            )}
          </div>

          {/* Right panel: extracted data */}
          <div style={{ background: C.white, borderRadius: 12, border: `1.5px solid ${C.border}`, padding: 24 }}>
            {current.confirmed ? (
              <>
                <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 18 }}>
                  Extrahierte Daten · bearbeitbar
                </div>

                {/* Meta */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 22 }}>
                  <InputField label="Versorger" value={current.confirmed.versorger} onChange={v => updateMeta("versorger", v)} placeholder="z.B. Stadtwerke Köln" />
                  <InputField label="Zeitraum"  value={current.confirmed.zeitraum}  onChange={v => updateMeta("zeitraum", v)}  placeholder="01.01.2025–31.12.2025" />
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ fontSize: 11, color: C.textMuted, display: "block", marginBottom: 5, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                      Umlageschlüssel
                    </label>
                    <select
                      value={current.confirmed.umlageschluessel}
                      onChange={e => updateMeta("umlageschluessel", e.target.value)}
                      style={{ width: "100%", padding: "8px 11px", border: `1.5px solid ${C.border}`, borderRadius: 7, fontFamily: F.sans, fontSize: 13, background: C.white, color: C.text }}
                    >
                      <option value="flaeche">Wohnfläche (m²) — für Objekt- und Gemeinschaftskosten</option>
                      <option value="verbrauch">Individualverbrauch — für Wasser, Heizung, Gas</option>
                    </select>
                  </div>
                </div>

                {/* Positions */}
                <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 12 }}>
                  Kostenpositionen
                </div>
                {current.confirmed.positionen.map((pos, i) => (
                  <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
                    <input
                      value={pos.bezeichnung}
                      onChange={e => updatePos(i, "bezeichnung", e.target.value)}
                      placeholder="Bezeichnung"
                      style={{ flex: 1, padding: "8px 11px", border: `1.5px solid ${C.border}`, borderRadius: 7, fontFamily: F.sans, fontSize: 13 }}
                    />
                    <input
                      value={pos.betrag}
                      onChange={e => updatePos(i, "betrag", e.target.value)}
                      type="number" step="0.01" min="0"
                      style={{ width: 96, padding: "8px 11px", border: `1.5px solid ${C.border}`, borderRadius: 7, fontFamily: F.sans, fontSize: 13, textAlign: "right" }}
                    />
                    <span style={{ fontSize: 12, color: C.textMuted, minWidth: 14 }}>€</span>
                    <button onClick={() => removePos(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, fontSize: 18, padding: "0 2px", lineHeight: 1 }}>×</button>
                  </div>
                ))}

                <button onClick={addPos} style={{
                  fontSize: 13, color: C.forestMid, background: "none",
                  border: `1.5px dashed ${C.border}`, borderRadius: 7,
                  padding: "7px 14px", cursor: "pointer", fontFamily: F.sans,
                  marginTop: 4, width: "100%",
                }}>
                  + Position hinzufügen
                </button>

                {/* Total */}
                <div style={{
                  marginTop: 18, padding: "12px 16px", background: C.neutral,
                  borderRadius: 9, display: "flex", justifyContent: "space-between", alignItems: "center",
                }}>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>Gesamtbetrag</span>
                  <span style={{ fontFamily: F.display, fontSize: 20 }}>
                    {fmt(current.confirmed.positionen.reduce((s, p) => s + (p.betrag || 0), 0))}
                  </span>
                </div>
              </>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: 280, color: C.textMuted }}>
                <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.4 }}>
                  {current.status === "extracting" ? "⟳" : "⚠"}
                </div>
                <div style={{ fontSize: 14 }}>
                  {current.status === "extracting" ? "Dokument wird analysiert…" : "Keine Daten extrahiert"}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Navigation */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 30 }}>
        <div style={{ display: "flex", gap: 8 }}>
          {reviewIdx > 0 && (
            <Btn variant="secondary" onClick={() => goToFile(reviewIdx - 1)}>← Zurück</Btn>
          )}
          {reviewIdx < files.length - 1 && (
            <Btn variant="secondary" onClick={() => goToFile(reviewIdx + 1)}>Nächste Datei →</Btn>
          )}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {!allDone && (
            <span style={{ fontSize: 13, color: C.textMuted }}>
              {files.filter(f => f.status === "extracting").length > 0 ? "Extraktion läuft…" : "Nicht alle Dateien verarbeitet"}
            </span>
          )}
          <Btn onClick={onNext} disabled={!allDone || !hasConfirmed}>
            Zur Vorschau →
          </Btn>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// SCREEN: VORSCHAU
// ═══════════════════════════════════════════════════════
function VorschauScreen({ kostenpositionen, onBack }) {
  const abrechnungsdaten = berechneAbrechnung(EINHEITEN, kostenpositionen);
  const gesamtkosten     = kostenpositionen.reduce((s, k) => s + (k.gesamtbetrag || 0), 0);
  const downloaded       = useState(false);
  const [done, setDone]  = useState(false);

  if (done) {
    return (
      <div style={{ padding: "80px 52px", maxWidth: 560, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 20 }}>✓</div>
        <h1 style={{ fontFamily: F.display, fontSize: 26, fontWeight: 400, marginBottom: 10 }}>PDFs erstellt</h1>
        <p style={{ color: C.textMuted, fontSize: 14, lineHeight: 1.65, marginBottom: 28 }}>
          Alle {EINHEITEN.length} Nebenkostenabrechnungen wurden als PDF generiert und stehen zum Download bereit.
          Die Dateien entsprechen den Anforderungen gemäß § 556 BGB.
        </p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <Tag color={C.success} bg={C.successBg}>§ 556 BGB konform</Tag>
          <Tag color={C.forest} bg={C.neutral}>4 PDFs generiert</Tag>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: "44px 52px", maxWidth: 900 }}>
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>
          Schritt 3 von 3
        </div>
        <h1 style={{ fontFamily: F.display, fontSize: 28, fontWeight: 400, marginBottom: 8 }}>
          Abrechnung Vorschau
        </h1>
        <p style={{ color: C.textMuted, fontSize: 14, lineHeight: 1.6 }}>
          Prüfen Sie die berechneten Beträge pro Wohneinheit, bevor Sie die PDFs für alle Mieter erstellen.
        </p>
      </div>

      {/* Kostenzusammenfassung */}
      <div style={{ background: C.white, borderRadius: 12, border: `1.5px solid ${C.border}`, padding: 24, marginBottom: 20 }}>
        <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 16 }}>
          Objektkosten 2025 · Gesamt
        </div>
        {kostenpositionen.map((k, i) => (
          <div key={i} style={{
            display: "flex", justifyContent: "space-between",
            padding: "9px 0", borderBottom: `1px solid ${C.borderLight}`, fontSize: 14,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontWeight: 500 }}>{k.versorger || "—"}</span>
              <Tag>{k.umlageschluessel === "flaeche" ? "Fläche" : "Verbrauch"}</Tag>
            </div>
            <span>{fmt(k.gesamtbetrag)}</span>
          </div>
        ))}
        <div style={{ display: "flex", justifyContent: "space-between", padding: "14px 0 0", fontWeight: 600 }}>
          <span>Gesamtkosten Objekt</span>
          <span style={{ fontFamily: F.display, fontSize: 20 }}>{fmt(gesamtkosten)}</span>
        </div>
      </div>

      {/* Per-Einheit table */}
      <div style={{ background: C.white, borderRadius: 12, border: `1.5px solid ${C.border}`, overflow: "hidden", marginBottom: 28 }}>
        <div style={{
          display: "grid", gridTemplateColumns: "auto 1fr auto auto auto",
          padding: "11px 20px", borderBottom: `1px solid ${C.border}`,
          fontSize: 10, color: C.textMuted, textTransform: "uppercase", letterSpacing: "0.07em", gap: 16,
        }}>
          <span>WE</span><span>Mieter</span><span style={{ textAlign: "right" }}>Kostenanteil</span>
          <span style={{ textAlign: "right" }}>Vorauszahlung</span>
          <span style={{ textAlign: "right", minWidth: 110 }}>Ergebnis</span>
        </div>
        {abrechnungsdaten.map((e, i) => (
          <div key={e.id} style={{
            display: "grid", gridTemplateColumns: "auto 1fr auto auto auto",
            padding: "15px 20px", gap: 16, alignItems: "center",
            borderBottom: i < abrechnungsdaten.length - 1 ? `1px solid ${C.borderLight}` : "none",
          }}>
            <div style={{
              width: 32, height: 32, borderRadius: 8,
              background: C.neutral, display: "flex", alignItems: "center",
              justifyContent: "center", fontSize: 11, fontWeight: 700, color: C.textMuted,
            }}>
              {e.nr.slice(-2)}
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{e.mieter}</div>
              <div style={{ fontSize: 12, color: C.textMuted }}>
                {e.flaeche} m² · {(e.anteil * 100).toFixed(1)}% Anteil
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 2 }}>Anteil</div>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{fmt(e.gesamtanteil)}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 2 }}>Vorausz.</div>
              <div style={{ fontSize: 14 }}>{fmt(e.vorauszahlung)}</div>
            </div>
            <div style={{
              textAlign: "right", padding: "8px 14px", borderRadius: 8, minWidth: 110,
              background: e.saldo >= 0 ? C.successBg : C.dangerBg,
              border: `1px solid ${e.saldo >= 0 ? C.successBorder : C.dangerBorder}`,
            }}>
              <div style={{ fontSize: 11, color: e.saldo >= 0 ? C.success : C.danger, marginBottom: 3, fontWeight: 500 }}>
                {e.saldo >= 0 ? "Guthaben" : "Nachzahlung"}
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, color: e.saldo >= 0 ? C.success : C.danger, fontFamily: F.display }}>
                {fmt(Math.abs(e.saldo))}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Actions */}
      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
        <Btn variant="secondary" onClick={onBack}>← Zurück</Btn>
        <Btn onClick={() => setDone(true)}>
          PDFs für alle {EINHEITEN.length} Mieter erstellen ↓
        </Btn>
        <Tag color={C.success} bg={C.successBg}>§ 556 BGB</Tag>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════
function App() {
  const [screen,    setScreen]    = useState("dashboard");
  const [files,     setFiles]     = useState([]);
  const [reviewIdx, setReviewIdx] = useState(0);

  const addFiles = (rawFiles) => {
    const items = Array.from(rawFiles).map(file => ({
      id:        uid(),
      file,
      name:      file.name,
      status:    "pending",
      extracted: null,
      confirmed: null,
    }));
    setFiles(prev => [...prev, ...items]);
  };

  const extractFile = useCallback(async (fileItem) => {
    setFiles(prev => prev.map(f => f.id === fileItem.id ? { ...f, status: "extracting" } : f));
    try {
      const b64    = await toBase64(fileItem.file);
      const result = await extractWithClaude(b64, fileItem.file);
      setFiles(prev => prev.map(f =>
        f.id === fileItem.id ? {
          ...f,
          status:    result.fehler ? "error" : "done",
          extracted: result,
          confirmed: result.fehler ? null : {
            versorger:        result.versorger       || "",
            zeitraum:         result.zeitraum        || "2025",
            positionen:       result.positionen      || [],
            gesamtbetrag:     result.gesamtbetrag    || 0,
            umlageschluessel: result.umlageschluessel || "flaeche",
          },
        } : f
      ));
    } catch {
      setFiles(prev => prev.map(f => f.id === fileItem.id ? { ...f, status: "error" } : f));
    }
  }, []);

  const startExtraction = () => {
    setScreen("review");
    setReviewIdx(0);
    const first = files.find(f => f.status === "pending");
    if (first) extractFile(first);
  };

  const kostenpositionen = files
    .filter(f => f.confirmed)
    .map(f => ({ ...f.confirmed, dateiname: f.name }));

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: ${C.border}; border-radius: 3px; }
        input, select, button { font-family: inherit; }
        input:focus, select:focus { outline: 2px solid ${C.forest}; outline-offset: 1px; }
      `}</style>

      <div style={{
        display: "flex", height: "100vh",
        fontFamily: F.sans, background: C.cream,
        color: C.text, overflow: "hidden",
      }}>
        <Sidebar screen={screen} goTo={setScreen} />

        <main style={{ flex: 1, overflow: "auto" }}>
          {screen === "dashboard" && (
            <DashboardScreen onStart={() => { setFiles([]); setScreen("upload"); }} />
          )}
          {screen === "upload" && (
            <UploadScreen
              files={files}
              onAddFiles={addFiles}
              onRemoveFile={id => setFiles(prev => prev.filter(f => f.id !== id))}
              onStart={startExtraction}
            />
          )}
          {screen === "review" && (
            <ReviewScreen
              files={files}
              reviewIdx={reviewIdx}
              setReviewIdx={setReviewIdx}
              onUpdateConfirmed={(id, data) =>
                setFiles(prev => prev.map(f => f.id === id ? { ...f, confirmed: data } : f))
              }
              onExtractFile={extractFile}
              onNext={() => setScreen("vorschau")}
            />
          )}
          {screen === "vorschau" && (
            <VorschauScreen
              kostenpositionen={kostenpositionen}
              onBack={() => setScreen("review")}
            />
          )}
        </main>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
